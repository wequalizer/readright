# nginx reverse proxy for ReadRight
# Place at /etc/nginx/sites-available/readright on waydream

server {
    listen 80;
    server_name readright.ai www.readright.ai;

    # Redirect HTTP to HTTPS (Cloudflare handles TLS termination)
    # If using Cloudflare Full (strict) mode, uncomment the ssl block below instead

    # --- Security headers ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;

    # --- File upload limit (matches API limit) ---
    client_max_body_size 50M;

    # --- Rate limiting zone (defined in nginx.conf http block) ---
    # In /etc/nginx/nginx.conf, add:
    #   limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/m;
    #   limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # --- Only allow Cloudflare IPs ---
    # Uncomment after setting up Cloudflare:
    # allow 173.245.48.0/20;
    # allow 103.21.244.0/22;
    # allow 103.22.200.0/22;
    # allow 103.31.4.0/22;
    # allow 141.101.64.0/18;
    # allow 108.162.192.0/18;
    # allow 190.93.240.0/20;
    # allow 188.114.96.0/20;
    # allow 197.234.240.0/22;
    # allow 198.41.128.0/17;
    # allow 162.158.0.0/15;
    # allow 104.16.0.0/13;
    # allow 104.24.0.0/14;
    # allow 172.64.0.0/13;
    # allow 131.0.72.0/22;
    # deny all;

    # Restore real visitor IP from Cloudflare
    # set_real_ip_from 173.245.48.0/20;
    # (repeat for all CF ranges)
    # real_ip_header CF-Connecting-IP;

    # --- Upload endpoints: strict rate limit ---
    location ~ ^/(parse|detect) {
        # limit_req zone=upload burst=3 nodelay;
        proxy_pass http://127.0.0.1:8500;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # --- API endpoints: moderate rate limit ---
    location /sources {
        # limit_req zone=api burst=10 nodelay;
        proxy_pass http://127.0.0.1:8500;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://127.0.0.1:8500;
        proxy_set_header Host $host;
    }

    # --- Static pages ---
    location / {
        proxy_pass http://127.0.0.1:8500;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Block sensitive paths ---
    location ~ /\. { deny all; }
    location ~ ~$ { deny all; }
}
